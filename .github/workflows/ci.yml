name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: node --check matomo-mcp-client.js
      - name: Verify server starts
        run: |
          output=$(MATOMO_HOST=https://example.com MATOMO_TOKEN_AUTH=test timeout 5 node matomo-mcp-client.js 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "Matomo MCP Server ready"
